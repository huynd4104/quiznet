<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <title>Quiznet Study</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="backdrop backdrop-a"></div>
  <div class="backdrop backdrop-b"></div>

  <div class="app-shell">
    <aside class="sidebar">
      <div style="display:grid;gap:12px;align-items:start;">
        <div class="sidebar-actions">
          <button id="reloadButton" class="secondary">Làm mới</button>
          <button id="autoNextButton" class="secondary toggle-button" type="button">Tự next</button>
        </div>
        <p class="wrong-count-line">Câu sai đang chờ ôn: <strong id="wrongCount">0</strong></p>
        <p class="active-learners-line">Đang học: <strong id="activeCount">1</strong> người</p>

        <div class="chat-container">
          <div class="chat-header">
            <strong>Thảo luận</strong>
            <button id="chatToggleBtn" class="chat-toggle-btn" title="Thu gọn/Mở rộng" type="button">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
            </button>
          </div>
          <div class="chat-messages" id="chatMessages">
            <div class="chat-empty">Đang tải tin nhắn...</div>
          </div>
          <div class="chat-input-wrapper">
            <div id="emojiPicker" class="emoji-picker hidden">
              <div class="emoji-picker-header">
                <input type="text" id="emojiSearch" placeholder="Tìm emoji..." />
              </div>
              <div class="emoji-list" id="emojiList"></div>
            </div>
            <form class="chat-input-row" id="chatForm">
              <button type="button" id="emojiToggleBtn" class="emoji-toggle-btn" title="Chọn emoji">😊</button>
              <input type="text" id="chatInput" placeholder="Nhắn gì đó..." maxlength="500" autocomplete="off" />
              <button type="submit" id="chatSendBtn">Gửi</button>
            </form>
          </div>
        </div>
      </div>
    </aside>

    <main class="stage">
      <section class="hero-card" id="heroCard"></section>

      <section class="question-card hidden" id="questionCard">
        <div class="question-topbar">
          <div>
            <span class="pill" id="questionBadge">Câu hỏi</span>
            <span class="pill soft" id="sourceBadge">Nguồn</span>
          </div>
          <div class="progress-text" id="progressText">0 / 0</div>
        </div>

        <div class="prompt" id="promptText"></div>

        <div class="option-list" id="optionList"></div>

        <div class="submit-row hidden" id="submitRow">
          <button id="submitButton">Xác nhận</button>
          <button id="clearSelectionButton" class="secondary">Bỏ chọn</button>
        </div>

          <div class="nav-row">
          <button id="prevButton" class="secondary">Quay lại</button>
          <button id="nextButton" disabled>Tiếp theo</button>
        </div>

        <div class="feedback hidden" id="feedback"></div>
      </section>

      <section class="empty-state" id="emptyState">
        <div class="empty-figure"></div>
        <h3>Chưa có bộ câu hỏi</h3>
        <p>
          Hãy bấm <strong>Tải ques.md</strong> hoặc dán nội dung file vào khung bên trái để bắt đầu.
        </p>
      </section>
    </main>
  </div>

  <div id="imageModal" class="modal hidden">
    <span class="close">&times;</span>
    <img class="modal-content" id="modalImg">
  </div>

  <script src="app.js?v=1.1"></script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
